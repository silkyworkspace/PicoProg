{% extends "base.html" %}

{% block title %}ユーザー設定{% endblock %}

{% block content %}
<div class="post-form-container">
    <h2>ユーザー設定</h2>


    <form method="POST" action="{{ url_for('user_settings') }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" name="username" value="{{ user.username if user else 'program-lover' }}"
                required>
        </div>

        <div class="form-group">
            <label for="icon">アイコン画像</label>
            <div class="current-icon">
                {% if user and user.icon_path %}
                <img id="icon-preview"
                     src="{{ url_for('static', filename='uploads/' + user.icon_path) }}"
                     alt="アイコンプレビュー"
                     class="preview-icon">
                {% else %}
                <div id="icon-placeholder" class="preview-icon sidebar-icon-default">{{ user.username[0] | upper }}</div>
                <img id="icon-preview" src="" alt="アイコンプレビュー" class="preview-icon" style="display:none;">
                {% endif %}
            </div>
            <input type="file" id="icon" name="icon" accept="image/*">
        </div>

        <div class="form-group">
            <label for="profile">プロフィール</label>
            <textarea id="profile" name="profile" rows="4"
                placeholder="自己紹介を入力してください">{{ user.profile or '' }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn">トップに戻る</a>
            <button type="submit" class="btn">変更</button>
        </div>

    </form>

</div><!-- .post-form-container -->

{% endblock %}

{% block scripts %}
<script>
    document.getElementById('icon').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const preview     = document.getElementById('icon-preview');
        const placeholder = document.getElementById('icon-placeholder');
        preview.src = URL.createObjectURL(file);
        preview.style.display = '';
        if (placeholder) placeholder.style.display = 'none';
    });
</script>
{% endblock %}
