{% extends "base.html" %}

{% block title %}500 サーバーエラー{% endblock %}

{% block content %}
<div class="error-container">
    <p class="error-code"><span>500</span><span class="error-kaomoji">(´•ω•`)</span></p>
    <h2 class="error-title">サーバーエラーが発生しました</h2>
    <p class="error-message">しばらく時間をおいてから再度お試しください。</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">トップに戻る</a>
</div>
{% endblock %}
