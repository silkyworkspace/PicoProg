{% extends "base.html" %}

{% block title %}404 ページが見つかりません{% endblock %}

{% block content %}
<div class="error-container">
    <p class="error-code"><span>404</span><span class="error-kaomoji">(*>ㅅ<)</span></p>
    <h2 class="error-title">ページが見つかりません</h2>
    <p class="error-message">お探しのページは存在しないか、移動した可能性があります。</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">トップに戻る</a>
</div>
{% endblock %}
