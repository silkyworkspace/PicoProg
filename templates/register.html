{% extends "base.html" %}

{% block title %}新規登録{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>新規登録</h2>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" name="username" required max-length="50" placeholder="ユーザー名(50文字以内)">
        </div>

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" required placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="パスワード（8文字以上）">
        </div>

        <div class="form-group">
            <label for="password_confirm">パスワード</label>
            <input type="password" id="password_confirm" name="password_confirm" required minlength="8"
                placeholder="パスワードを再入力">
        </div>

        <button type="submit" class="btn btn-primary">登録してログイン</button>

    </form>
</div>
{% endblock %}
